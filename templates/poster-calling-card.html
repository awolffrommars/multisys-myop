<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Calling Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1920px;
      height: 1152px;
      overflow: hidden;
      font-family: 'Montserrat', 'Helvetica Neue', Arial, sans-serif;
    }
    .card {
      width: 1920px;
      height: 1152px;
      position: relative;
      overflow: hidden;
    }
    .template-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    .name-overlay {
      position: absolute;
      left: 0;
      top: 124px;
      width: 1920px;
      text-align: center;
      z-index: 10;
      font-size: 100px;
      font-weight: 800;
      color: #fff;
      white-space: nowrap;
      line-height: 1;
    }
    .position-overlay {
      position: absolute;
      left: 0;
      top: 233.5px;
      width: 1920px;
      text-align: center;
      z-index: 10;
      font-size: 53.5px;
      font-weight: 500;
      color: #fff;
      white-space: nowrap;
      line-height: 1;
    }
    .email-overlay {
      position: absolute;
      left: 208px;
      top: 556px;
      z-index: 10;
      font-size: 44px;
      font-weight: 400;
      color: #1a1a1a;
      white-space: nowrap;
    }
    .phone-overlay {
      position: absolute;
      left: 208px;
      top: 642px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .phone {
      font-size: 44px;
      font-weight: 400;
      color: #1a1a1a;
      line-height: 1.25;
      white-space: nowrap;
    }

    /* ── QR code positioned over the green box ── */
    /* Green box measured at: left=1325, top=545, right=1799, bottom=1018, size=474×473 */
    .qr {
      position: absolute;
      left: 1326px;
      top: 546px;
      width: 474px;
      height: 474px;
      z-index: 10;
    }
    .qr img.qr-code {
      width: 100%;
      height: 100%;
      display: block;
    }
    .qr-logo {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      line-height: 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <img class="template-bg" src="{{TEMPLATE_BASE64}}" alt="" />

    <div class="name-overlay">{{FULL_NAME}}</div>
    <div class="position-overlay">{{POSITION}}</div>
    <div class="email-overlay">{{EMAIL}}</div>
    <div class="phone-overlay">{{PHONE_LINES}}</div>

    <div class="qr">
      <img class="qr-code" src="{{QR_BASE64}}" alt="QR Code" />
      <div class="qr-logo">
        <img src="{{LOGO_BASE64}}" alt="Multisys" style="height:136px;width:auto;display:block;mix-blend-mode:multiply" />
      </div>
    </div>
  </div>
</body>
</html>
